# ~/.config/tmux/tmux.conf

# ---- Prefix: C-a (easier than C-b) ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- General ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g bell-action none
set -g mouse on

# ---- Reload ----
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ============================================================================
# Seamless Ctrl+hjkl nav across tmux panes AND Neovim splits (smart-splits.nvim)
# The is_vim guard forwards the keys to nvim when a vim-like process owns the
# pane; otherwise tmux moves. Ctrl-l keeps clear-screen under <prefix> C-l.
# ============================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?\\.?(g?(view|l?n?vim?x?)|fzf)(diff)?$'"

# Horizontal nav in a NON-vim pane runs tmux-nav, which maintains the 1-column
# edge "spacer" panes (so the active pane is outlined on the left/right too) and
# wraps around, skipping the spacers. Vertical nav is plain select-pane.
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'run-shell "$HOME/.local/bin/tmux-nav -L"'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'run-shell "$HOME/.local/bin/tmux-nav -R"'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind C-l send-keys 'C-l'   # <prefix> C-l = clear screen

# Intuitive splits (keep current path). v/s mirror nvim's vv/ss:
#   <prefix> v = vertical split (side by side)   <prefix> s = horizontal (stacked)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Keep the edge spacer panes at width 1 after a terminal resize.
set-hook -g window-resized 'run-shell "$HOME/.local/bin/tmux-fix-spacers"'
set-hook -g client-resized 'run-shell "$HOME/.local/bin/tmux-fix-spacers"'

# ---- Copy mode (vi + pbcopy), carried over from .tmux.conf.user ----
setw -g mode-keys vi
bind -n M-Space copy-mode
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind C-c run "tmux save-buffer - | pbcopy"

# ---- Active-pane visibility (ultrawide: know which pane you're in) ----
# smart-splits only navigates; tmux draws the panes. Use a bold orange active
# border (theme-safe: works in both Gruvbox light and dark). NOTE: fg/bg
# `window-style` dimming was removed — it used dark-theme colours that vanished
# on the light theme, and apps like nvim override it anyway. The spacer panes
# remain the theme-agnostic option if the border isn't enough on an ultrawide.
# Text is NEVER dimmed — that backfired (active pane looked fainter). Reset to
# default so all pane text renders at full contrast in any theme.
set -g window-style 'default'
set -g window-active-style 'default'

# The indicator is a per-pane title bar: the ACTIVE pane gets a solid orange
# block ("▶ N cmd", dark text on orange); inactive panes get plain grey text.
# Colours are hardcoded in the format (256-colour to avoid # escaping), so it's
# theme-independent and unmissable across a wide screen.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour246'
set -g pane-active-border-style 'fg=colour208,bold'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=colour235#,bg=colour208#,bold] ▶ #P #{pane_current_command} #[default],#[fg=colour245] #P #{pane_current_command} }'

# ---- Status line ----
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default"
set -g status-left-length 40
set -g status-right-length 80

# Session name: blue block on the left.
set -g status-left "#[fg=colour235,bg=colour109,bold] #S #[default] "

# Window "tabs": inactive = grey text; active = solid orange block — the same
# focus colour as the active pane, so "orange = you are here" everywhere.
set -g window-status-separator "#[fg=colour240] "
set -g window-status-format "#[fg=colour245] #I:#W #[default]"
set -g window-status-current-format "#[fg=colour235,bg=colour208,bold] #I:#W #[default]"

# Right: AWS profile (blue) + git branch (green).
set -g status-right "#{?AWS_PROFILE,#[fg=colour109]aws:#{AWS_PROFILE}  ,}#[fg=colour108]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) "

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'
