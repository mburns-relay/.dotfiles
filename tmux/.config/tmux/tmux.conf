# ~/.config/tmux/tmux.conf

# ---- Prefix: C-a (easier than C-b) ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- General ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g bell-action none
set -g mouse on

# ---- Reload ----
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ============================================================================
# Seamless Ctrl+hjkl nav across tmux panes AND Neovim splits (smart-splits.nvim)
# The is_vim guard forwards the keys to nvim when a vim-like process owns the
# pane; otherwise tmux moves. Ctrl-l keeps clear-screen under <prefix> C-l.
# ============================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?\\.?(g?(view|l?n?vim?x?)|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind C-l send-keys 'C-l'   # <prefix> C-l = clear screen

# Intuitive splits (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# TODO(phase 2): recreate the thin 1-column "spacer" panes between splits
#                (port of the old tmux-nav visual separators) on top of this.

# ---- Copy mode (vi + pbcopy), carried over from .tmux.conf.user ----
setw -g mode-keys vi
bind -n M-Space copy-mode
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind C-c run "tmux save-buffer - | pbcopy"

# ---- Active-pane visibility (ultrawide: know which pane you're in) ----
# smart-splits only navigates; tmux draws the panes. Dim inactive panes and
# brighten the active one, plus a bold gruvbox-orange active border. This reads
# better across a wide screen than borders alone (edge panes have no outer
# border to colour — that gap is what the old spacer panes filled).
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#fe8019'
set -g window-style 'fg=#928374'
set -g window-active-style 'fg=#ebdbb2'
set -g pane-border-status off

# ---- Status line ----
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default"
set -g status-left "#[bold] #S #[default]"
set -g status-left-length 30
set -g status-right "#{?AWS_PROFILE,aws:#{AWS_PROFILE} ,}#[fg=green]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) "
setw -g window-status-current-style "bold"

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'
