# AeroSpace — i3-style tiling WM. No SIP disabling required.
# OS layer of the hjkl model: everything on `alt` so it never collides with the
# Ctrl (= held Caps) terminal nav layer.

start-at-login = true
after-startup-command = ['exec-and-forget sketchybar']

# Notify sketchybar on workspace change so the bar's indicators stay in sync.
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.top = 34   # exact sketchybar height; native menu bar auto-hides so this is measured from screen top
outer.bottom = 0

[mode.main.binding]
# --- focus (OS layer of hjkl) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- move windows ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- layouts ---
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'

# --- workspaces ---
alt-1 = 'workspace 1'   # big monitor
alt-2 = 'workspace 2'   # big monitor
alt-3 = 'workspace 3'   # built-in
alt-4 = 'workspace 4'   # built-in

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'

alt-tab = 'workspace-back-and-forth'
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']   # reset layout
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# --- pin workspaces to monitors ---
[workspace-to-monitor-force-assignment]
1 = 'C49RG9x'
2 = 'C49RG9x'
3 = 'Built-in Retina Display'
4 = 'Built-in Retina Display'

# --- auto-place apps (edit to taste) ---
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'   # comms lives on the built-in
